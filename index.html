<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OoT Rando Tracker</title>
    <style>
        /* Dark theme, 100% viewport height, NO scrolling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e24;
            color: #e0e0e0;
            margin: 0;
            padding: 5px 10px;
            box-sizing: border-box;
            font-size: 12px;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        h2 {
            color: #fca311;
            border-bottom: 1px solid #333;
            margin: 4px 0;
            padding-bottom: 2px;
            font-size: 14px;
            flex-shrink: 0;
        }

        /* Generic input styling */
        textarea, select {
            background-color: #2b2b36;
            color: #fff;
            border: 1px solid #444;
            border-radius: 3px;
            padding: 2px 4px;
            box-sizing: border-box;
            resize: none;
            font-size: 11px;
            font-family: inherit;
        }

        textarea {
            width: 100%;
        }

        select:focus, textarea:focus {
            outline: none;
            border-color: #fca311;
        }

        .arrow {
            color: #888;
            font-weight: bold;
            font-size: 14px;
            padding: 0 4px;
            display: flex;
            align-items: center;
        }

        /* Top Sections */
        .barren-container, #path-container {
            display: flex;
            flex-direction: column;
            gap: 3px;
            width: 100%;
        }

        .barren-container {
            flex: 0.15;
        }

        #path-container {
            flex: 0.35;
        }

        .barren-container textarea {
            flex: 1;
        }

        /* Bottom Side-by-Side Section */
        .bottom-split {
            flex: 0.50;
            display: flex;
            gap: 10px;
            margin-top: 5px;
            min-height: 0; /* Prevents overflow pushing */
        }

        .notes-section, .dungeons-section {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 0; 
        }

        #notes-container, #dungeon-container {
            display: flex;
            flex-direction: column;
            gap: 3px;
            flex: 1;
        }

        /* Row layouts */
        .row {
            display: flex;
            align-items: stretch;
            flex: 1;
        }

        .path-row textarea, .note-row textarea {
            flex: 1;
            margin: 0;
        }

        .dungeon-row {
            align-items: center;
            justify-content: flex-end; /* Pushes dropdowns to the right */
        }

        .dungeon-label {
            flex: 1;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .dungeon-row select {
            flex: none; 
            width: auto; 
            height: 100%;
            margin: 0;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h2>Barren</h2>
    <div class="barren-container">
        <textarea placeholder="Barren area 1..."></textarea>
        <textarea placeholder="Barren area 2..."></textarea>
    </div>

    <h2>Path</h2>
    <div id="path-container">
        <!-- Generated by JavaScript -->
    </div>

    <!-- Split Layout for Notes and Dungeons -->
    <div class="bottom-split">
        <div class="notes-section">
            <h2>Notes</h2>
            <div id="notes-container">
                <!-- Generated by JavaScript -->
            </div>
        </div>
        
        <div class="dungeons-section">
            <h2>Dungeons</h2>
            <div id="dungeon-container">
                <!-- Generated by JavaScript -->
            </div>
        </div>
    </div>

    <script>
        // --- Generate Path Elements ---
        const pathContainer = document.getElementById('path-container');
        for (let i = 0; i < 8; i++) {
            const row = document.createElement('div');
            row.className = 'row path-row';
            row.innerHTML = `
                <textarea placeholder="Source"></textarea>
                <span class="arrow">→</span>
                <textarea placeholder="Destination"></textarea>
            `;
            pathContainer.appendChild(row);
        }

        // --- Generate Note Elements ---
        const notesContainer = document.getElementById('notes-container');
        for (let i = 0; i < 7; i++) {
            const row = document.createElement('div');
            row.className = 'row note-row';
            row.innerHTML = `
                <textarea placeholder="Hint / Item"></textarea>
                <span class="arrow">→</span>
                <textarea placeholder="Location"></textarea>
            `;
            notesContainer.appendChild(row);
        }

        // --- Generate Dungeon Elements ---
        const dungeons = ['Deku', 'Dodongo', 'Jabu', 'Forest', 'Fire', 'Water', 'Shadow', 'Spirit', 'BotW', 'Ice', 'GTG'];
        const dungeonContainer = document.getElementById('dungeon-container');
        
        dungeons.forEach(dungeon => {
            const row = document.createElement('div');
            row.className = 'row dungeon-row';
            
            const labelHtml = `<span class="dungeon-label">${dungeon}</span> <span class="arrow">→</span>`;
            
            const select = document.createElement('select');
            select.className = 'dungeon-select';
            
            const defaultOption = document.createElement('option');
            defaultOption.value = "";
            defaultOption.innerText = "---";
            select.appendChild(defaultOption);

            dungeons.forEach(d => {
                const option = document.createElement('option');
                option.value = d;
                option.innerText = d;
                select.appendChild(option);
            });

            row.innerHTML = labelHtml;
            row.appendChild(select);
            dungeonContainer.appendChild(row);
        });

        // --- Mutually Exclusive Dropdown Logic ---
        const selects = document.querySelectorAll('.dungeon-select');

        function updateDropdowns() {
            const selectedValues = Array.from(selects)
                .map(s => s.value)
                .filter(val => val !== "");

            selects.forEach(select => {
                const currentSelectValue = select.value;

                Array.from(select.options).forEach(option => {
                    if (option.value === "") return;

                    if (selectedValues.includes(option.value) && option.value !== currentSelectValue) {
                        option.disabled = true;
                        option.style.color = "#555";
                    } else {
                        option.disabled = false;
                        option.style.color = "#fff";
                    }
                });
            });
        }

        selects.forEach(select => {
            select.addEventListener('change', updateDropdowns);
        });

        // --- NEW: Prevent Accidental Refresh / Close ---
        window.addEventListener('beforeunload', function (e) {
            // Cancel the event as stated by the standard.
            e.preventDefault();
            // Chrome requires returnValue to be set.
            e.returnValue = '';
        });
    </script>
</body>
</html>
