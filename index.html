<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OoT Rando Tracker</title>
    <style>
        /* Dark theme, 100% viewport height, NO scrolling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e24;
            color: #e0e0e0;
            margin: 0;
            padding: 5px 10px;
            box-sizing: border-box;
            font-size: 14px; 
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            text-transform: uppercase;
        }

        h2 {
            color: #fca311;
            border-bottom: 1px solid #333;
            margin: 4px 0;
            padding-bottom: 2px;
            font-size: 16px; 
            flex-shrink: 0;
        }

        /* Generic input styling */
        textarea, select {
            background-color: #2b2b36;
            color: #fff;
            border: 1px solid #444;
            border-radius: 3px;
            padding: 2px 4px;
            box-sizing: border-box;
            resize: none;
            font-size: 14px; 
            font-family: inherit;
            text-transform: uppercase;
        }

        textarea {
            width: 100%;
        }

        select:focus, textarea:focus {
            outline: none;
            border-color: #fca311;
        }

        .arrow {
            color: #888;
            font-weight: bold;
            font-size: 16px; 
            padding: 0 4px;
            display: flex;
            align-items: center;
        }

        /* --- Barren Section --- */
        .barren-container {
            display: flex;
            flex-direction: row; 
            gap: 10px; 
            width: 100%;
            flex: none; 
            height: 28px; 
        }

        .barren-container textarea {
            flex: 1; 
            padding-top: 4px; 
        }

        /* --- Path Section --- */
        #path-container {
            display: flex;
            flex-direction: column;
            gap: 2px;
            width: 100%;
            flex: none; 
        }

        .path-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 2px;
        }

        .path-row {
            display: flex;
            align-items: stretch;
            flex: none;
            height: 28px; 
        }

        .path-row textarea {
            flex: 1;
            margin: 0;
            padding-top: 4px; 
        }

        /* Sub-row for the item dropdowns */
        .item-row {
            display: flex;
            gap: 4px;
            flex-wrap: wrap; 
            padding-left: 22px; 
            margin-top: 2px;
            align-items: center; /* Keeps button and dropdowns aligned */
        }

        .item-select {
            flex: none;
            width: auto; 
            height: 22px;
            font-size: 11px; 
            cursor: pointer;
        }

        /* NEW: Delete Button Styling */
        .delete-item-btn {
            background: none;
            border: none;
            color: #d9534f; /* Soft red */
            font-size: 14px;
            cursor: pointer;
            padding: 0 4px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .delete-item-btn:hover {
            color: #ff7675; /* Lighter red on hover */
        }

        /* Path Checkbox Styling */
        .path-checkbox {
            margin: 0 6px 0 2px;
            align-self: center; 
            cursor: pointer;
            width: 16px;
            height: 16px;
            accent-color: #fca311; 
        }

        /* The transparent state for completed paths */
        .resolved {
            opacity: 0.4;
            transition: opacity 0.2s ease-in-out; 
        }

        /* --- Bottom Side-by-Side Section --- */
        .bottom-split {
            flex: 1; 
            display: flex;
            gap: 10px;
            margin-top: 5px;
            min-height: 0; 
        }

        .notes-section, .dungeons-section {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 0; 
        }

        #notes-container, #dungeon-container {
            display: flex;
            flex-direction: column;
            gap: 3px;
            flex: 1;
        }

        .row {
            display: flex;
            align-items: stretch;
            flex: 1;
        }

        .note-row textarea {
            flex: 1;
            margin: 0;
        }

        .dungeon-row {
            align-items: center;
            justify-content: flex-end; 
        }

        .dungeon-label {
            flex: 1;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .dungeon-row select {
            flex: none; 
            width: auto; 
            height: 100%;
            margin: 0;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h2>Barren</h2>
    <div class="barren-container">
        <textarea placeholder="Barren area 1..."></textarea>
        <textarea placeholder="Barren area 2..."></textarea>
    </div>

    <h2>Path</h2>
    <div id="path-container">
        <!-- Generated by JavaScript -->
    </div>

    <!-- Split Layout for Notes and Dungeons -->
    <div class="bottom-split">
        <div class="notes-section">
            <h2>Notes</h2>
            <div id="notes-container">
                <!-- Generated by JavaScript -->
            </div>
        </div>
        
        <div class="dungeons-section">
            <h2>Dungeons</h2>
            <div id="dungeon-container">
                <!-- Generated by JavaScript -->
            </div>
        </div>
    </div>

    <script>
        // --- Game Data ---
        const gameItems = [
            "Bow", "Hookshot", "Longshot", "Hammer", "Bombs", "Bombchus", "Scale", 
            "Strength 1", "Strength 2", "Strength 3", "KokiriSword", "BiggoronSword", 
            "MirrorShield", "ZoraTunic", "GoronTunic", "IronBoots", "HoverBoots", 
            "Dins", "Farores", "Nayrus", "Magic", "Fire", "Ice", "Light", "Slingshot", 
            "Boomerang", "Lens", "Bottle", "ZoraLetter"
        ];
        const gameSongs = [
            "ZeldasLullaby", "EponasSong", "SunsSong", "SariasSong", "SongofTime", 
            "SongofStorms", "MinuetofForest", "BoleroofFire", "SerenadeofWater", 
            "NocturneofShadow", "RequiemofSpirit", "PreludeofLight"
        ];
        const allItemsAndSongs = [...gameItems, ...gameSongs];

        // --- Mutually Exclusive Logic for Items ---
        function updateItemDropdowns() {
            const allItemSelects = document.querySelectorAll('.item-select');
            const selectedValues = Array.from(allItemSelects)
                .map(s => s.value)
                .filter(val => val !== "");

            allItemSelects.forEach(select => {
                const currentVal = select.value;
                Array.from(select.options).forEach(option => {
                    if (option.value === "") return;

                    if (selectedValues.includes(option.value) && option.value !== currentVal) {
                        option.disabled = true;
                        option.style.color = "#555";
                    } else {
                        option.disabled = false;
                        option.style.color = "#fff";
                    }
                });
            });
        }

        // --- Logic to create a new item dropdown ---
        // Now accepts a referenceNode (the delete button) so the dropdown always spawns BEFORE the button
        function createItemDropdown(container, referenceNode) {
            const select = document.createElement('select');
            select.className = 'item-select';
            
            const defaultOpt = document.createElement('option');
            defaultOpt.value = "";
            defaultOpt.innerText = "---";
            select.appendChild(defaultOpt);

            allItemsAndSongs.forEach(item => {
                const opt = document.createElement('option');
                opt.value = item;
                opt.innerText = item;
                select.appendChild(opt);
            });

            select.addEventListener('change', function() {
                updateItemDropdowns();
                
                const selectsInRow = container.querySelectorAll('.item-select');
                const isLast = (this === selectsInRow[selectsInRow.length - 1]);
                const isResolved = container.parentElement.querySelector('.path-checkbox').checked;
                
                if (this.value !== "" && isLast && !isResolved) {
                    createItemDropdown(container, referenceNode);
                }
            });

            // Insert before the delete button
            container.insertBefore(select, referenceNode);
            updateItemDropdowns(); 
        }

        // --- Generate Path Elements ---
        const pathContainer = document.getElementById('path-container');
        for (let i = 0; i < 8; i++) {
            const group = document.createElement('div');
            group.className = 'path-group';

            const row = document.createElement('div');
            row.className = 'path-row';
            row.innerHTML = `
                <input type="checkbox" class="path-checkbox" title="Mark as resolved">
                <textarea placeholder="Source"></textarea>
                <span class="arrow">→</span>
                <textarea placeholder="Destination"></textarea>
            `;

            const itemRow = document.createElement('div');
            itemRow.className = 'item-row';
            
            // Create the Delete Button for this row
            const delBtn = document.createElement('button');
            delBtn.className = 'delete-item-btn';
            delBtn.innerHTML = '✖';
            delBtn.title = 'Remove last item';

            // Delete Button Logic
            delBtn.addEventListener('click', function() {
                const selects = itemRow.querySelectorAll('.item-select');
                // If there is more than 1 dropdown, delete the last one safely
                if (selects.length > 1) {
                    selects[selects.length - 1].remove();
                    updateItemDropdowns();
                } 
                // If it's the only one left, just reset it so the user can still use it
                else if (selects.length === 1) {
                    selects[0].value = "";
                    updateItemDropdowns();
                }
            });

            // Append the button FIRST...
            itemRow.appendChild(delBtn);
            
            // ...then generate the first dropdown BEFORE the button.
            createItemDropdown(itemRow, delBtn);

            group.appendChild(row);
            group.appendChild(itemRow);
            pathContainer.appendChild(group);

            // Checkbox Fade & Cleanup Logic
            const checkbox = row.querySelector('.path-checkbox');
            checkbox.addEventListener('change', function() {
                if (this.checked) {
                    group.classList.add('resolved');
                    const selects = itemRow.querySelectorAll('.item-select');
                    const lastSelect = selects[selects.length - 1];
                    if (lastSelect && lastSelect.value === "") {
                        lastSelect.remove();
                    }
                } else {
                    group.classList.remove('resolved');
                    const selects = itemRow.querySelectorAll('.item-select');
                    if (selects.length === 0 || selects[selects.length - 1].value !== "") {
                        createItemDropdown(itemRow, delBtn);
                    }
                }
            });
        }

        // --- Generate Note Elements ---
        const notesContainer = document.getElementById('notes-container');
        for (let i = 0; i < 7; i++) {
            const row = document.createElement('div');
            row.className = 'row note-row';
            row.innerHTML = `
                <textarea placeholder="Hint / Item"></textarea>
                <span class="arrow">→</span>
                <textarea placeholder="Location"></textarea>
            `;
            notesContainer.appendChild(row);
        }

        // --- Generate Dungeon Elements ---
        const dungeons = ['Deku', 'Dodongo', 'Jabu', 'Forest', 'Fire', 'Water', 'Shadow', 'Spirit', 'BotW', 'Ice', 'GTG'];
        const dungeonContainer = document.getElementById('dungeon-container');
        
        dungeons.forEach(dungeon => {
            const row = document.createElement('div');
            row.className = 'row dungeon-row';
            
            const labelHtml = `<span class="dungeon-label">${dungeon}</span> <span class="arrow">→</span>`;
            
            const select = document.createElement('select');
            select.className = 'dungeon-select';
            
            const defaultOption = document.createElement('option');
            defaultOption.value = "";
            defaultOption.innerText = "---";
            select.appendChild(defaultOption);

            dungeons.forEach(d => {
                const option = document.createElement('option');
                option.value = d;
                option.innerText = d;
                select.appendChild(option);
            });

            row.innerHTML = labelHtml;
            row.appendChild(select);
            dungeonContainer.appendChild(row);
        });

        // --- Mutually Exclusive Dropdown Logic for Dungeons ---
        const dungeonSelects = document.querySelectorAll('.dungeon-select');
        function updateDungeonDropdowns() {
            const selectedValues = Array.from(dungeonSelects)
                .map(s => s.value)
                .filter(val => val !== "");

            dungeonSelects.forEach(select => {
                const currentSelectValue = select.value;
                Array.from(select.options).forEach(option => {
                    if (option.value === "") return;

                    if (selectedValues.includes(option.value) && option.value !== currentSelectValue) {
                        option.disabled = true;
                        option.style.color = "#555";
                    } else {
                        option.disabled = false;
                        option.style.color = "#fff";
                    }
                });
            });
        }

        dungeonSelects.forEach(select => {
            select.addEventListener('change', updateDungeonDropdowns);
        });

        // --- Prevent Accidental Refresh / Close ---
        window.addEventListener('beforeunload', function (e) {
            e.preventDefault();
            e.returnValue = '';
        });
    </script>
</body>
</html>
