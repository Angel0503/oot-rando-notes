<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OoT Rando Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h2>Barren</h2>
    <div class="barren-container">
        <textarea placeholder="Barren area 1..."></textarea>
        <textarea placeholder="Barren area 2..."></textarea>
    </div>

    <h2>Path</h2>
    <div id="path-container">
        </div>

    <div class="bottom-split">
        <div class="notes-section">
            <h2>Notes</h2>
            <div id="notes-container">
                </div>
        </div>
        
        <div class="dungeons-section">
            <div class="dungeons-header">
                <h2>Dungeons</h2>
                <div id="connection-status" class="status-disconnected">
                    <span class="status-indicator"></span>
                    <span class="status-text">Disconnected</span>
                </div>
            </div>
            
            <div id="dungeon-container">
                </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
